<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTS — Editorial Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F5D76E;
    --gold-dim: #8B7532;
    --bg: #0A0A0A;
    --card-bg: #111111;
    --card-border: #1A1A1A;
    --text: #E8E8E8;
    --text-dim: #888888;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; direction: rtl; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 32px 20px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 28px; }
  .logo {
    font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -1px; margin-bottom: 6px;
  }
  .tagline { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

  /* Tabs */
  .tabs-wrap { margin-bottom: 24px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabs-wrap::-webkit-scrollbar { height: 4px; }
  .tabs-wrap::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
  .tabs {
    display: flex; gap: 6px; padding: 4px 0; min-width: max-content; justify-content: center; flex-wrap: wrap;
  }
  .tab {
    font-family: 'DM Mono', monospace; font-size: 0.78rem;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    background: var(--card-bg); border: 1px solid var(--card-border);
    color: var(--text-dim); transition: all 0.25s; white-space: nowrap; user-select: none;
  }
  .tab:hover { border-color: var(--gold-dim); color: var(--text); }
  .tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--bg); border-color: var(--gold); font-weight: 600;
  }
  .tab.has-data { position: relative; }
  .tab.has-data::after {
    content: ''; position: absolute; top: 4px; left: 4px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--gold-light);
  }

  /* Custom URL input */
  .custom-input-row {
    display: flex; gap: 10px; justify-content: center; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; display: none;
  }
  .custom-input-row.visible { display: flex; }
  .custom-input-row input {
    background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.9rem;
    padding: 12px 18px; border-radius: 8px; width: 400px; max-width: 75vw;
    direction: ltr; text-align: left; outline: none; transition: border-color 0.3s;
  }
  .custom-input-row input::placeholder { color: var(--text-dim); }
  .custom-input-row input:focus { border-color: var(--gold-dim); }

  .btn {
    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--bg); border: none; padding: 12px 28px; border-radius: 8px;
    cursor: pointer; letter-spacing: 1px; transition: all 0.3s; position: relative; overflow: hidden;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,175,55,0.25); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn .spinner {
    display: none; width: 16px; height: 16px; border: 2px solid var(--bg);
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle;
  }
  .btn.loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Channel info */
  .channel-info { text-align: center; margin-bottom: 28px; display: none; animation: fadeIn 0.5s ease; }
  .channel-info.visible { display: block; }
  .channel-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
  .channel-meta { font-size: 0.78rem; color: var(--text-dim); }

  .status { text-align: center; margin-bottom: 24px; font-size: 0.82rem; color: var(--gold-dim); min-height: 22px; }
  .error-msg { text-align: center; color: #e74c3c; font-size: 0.88rem; margin-bottom: 20px; display: none; }
  .error-msg.visible { display: block; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 24px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
    padding: 28px; position: relative; overflow: hidden;
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.3s, box-shadow 0.3s;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card:hover { border-color: var(--gold-dim); box-shadow: 0 8px 40px rgba(212,175,55,0.08); }
  .card::before {
    content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .card-number {
    font-family: 'Playfair Display', serif; font-size: 3.2rem; font-weight: 900;
    color: rgba(212,175,55,0.08); position: absolute; top: 10px; left: 18px; line-height: 1;
  }
  .card-date { font-size: 0.72rem; color: var(--gold-dim); margin-bottom: 10px; }
  .card-channel { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px; }
  .card-title {
    font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700;
    color: var(--gold-light); margin-bottom: 14px; line-height: 1.4;
  }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { text-decoration: underline; }
  .section { margin-bottom: 16px; }
  .section-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--gold); margin-bottom: 6px; font-weight: 500;
  }
  .section-content { font-size: 0.85rem; color: var(--text-dim); line-height: 1.7; }
  .section-content ul { list-style: none; padding: 0; }
  .section-content ul li { padding: 3px 0; padding-right: 16px; position: relative; }
  .section-content ul li::before { content: '▸'; position: absolute; right: 0; color: var(--gold-dim); }

  /* Conclusions panel */
  .conclusions-panel { display: none; }
  .conclusions-panel.visible { display: block; }
  .conclusion-section {
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
    padding: 28px; margin-bottom: 20px; position: relative; overflow: hidden;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .conclusion-section.visible { opacity: 1; transform: translateY(0); }
  .conclusion-section::before {
    content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), transparent);
  }
  .conclusion-title {
    font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700;
    color: var(--gold-light); margin-bottom: 16px;
  }
  .conclusion-content { font-size: 0.88rem; color: var(--text-dim); line-height: 1.8; }
  .conclusion-content ul { list-style: none; padding: 0; }
  .conclusion-content ul li { padding: 5px 0 5px 0; padding-right: 18px; position: relative; }
  .conclusion-content ul li::before { content: '◆'; position: absolute; right: 0; color: var(--gold); font-size: 0.7rem; top: 8px; }
  .no-data-msg {
    text-align: center; color: var(--text-dim); font-size: 0.9rem; padding: 60px 20px;
  }

  /* Top action bar */
  .top-bar {
    display: flex; gap: 10px; justify-content: center; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .top-bar .btn-conclusions {
    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700;
    background: transparent; border: 2px solid var(--gold);
    color: var(--gold); padding: 12px 32px; border-radius: 8px;
    cursor: pointer; letter-spacing: 1px; transition: all 0.3s;
  }
  .top-bar .btn-conclusions:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--bg); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,175,55,0.25);
  }
  .top-bar .btn-conclusions.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--bg);
  }
  .btn-run-all {
    font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 500;
    background: var(--card-bg); border: 1px solid var(--gold-dim);
    color: var(--gold-light); padding: 12px 24px; border-radius: 8px;
    cursor: pointer; transition: all 0.3s;
  }
  .btn-run-all:hover {
    border-color: var(--gold); background: #1a1a1a; transform: translateY(-1px);
  }
  .btn-run-all:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-run-all .spinner {
    display: none; width: 14px; height: 14px; border: 2px solid var(--gold-light);
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle;
  }
  .btn-run-all.loading .spinner { display: inline-block; }

  .run-all-progress {
    text-align: center; font-size: 0.78rem; color: var(--gold-dim); margin-bottom: 16px;
    min-height: 20px;
  }
  .progress-bar-wrap {
    max-width: 400px; margin: 8px auto 0; height: 4px; background: var(--card-border);
    border-radius: 2px; overflow: hidden; display: none;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px; transition: width 0.4s ease; width: 0%;
  }

  /* Market Dashboard */
  .dashboard-toggle {
    font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 500;
    background: var(--card-bg); border: 1px solid var(--gold-dim);
    color: var(--gold-light); padding: 12px 24px; border-radius: 8px;
    cursor: pointer; transition: all 0.3s;
  }
  .dashboard-toggle:hover { border-color: var(--gold); background: #1a1a1a; transform: translateY(-1px); }
  .dashboard-toggle.active { background: linear-gradient(135deg, var(--gold), var(--gold-dim)); color: var(--bg); border-color: var(--gold); }
  .dashboard-wrap {
    display: none; margin-bottom: 24px; animation: fadeIn 0.4s ease;
  }
  .dashboard-wrap.visible { display: block; }
  .dashboard-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  .dashboard-title {
    font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold);
  }
  .dashboard-updated {
    font-size: 0.68rem; color: var(--text-dim);
  }
  .dashboard-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px;
  }
  .dash-card {
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px;
    padding: 12px 14px; transition: border-color 0.3s;
  }
  .dash-card:hover { border-color: var(--gold-dim); }
  .dash-card .label {
    font-size: 0.68rem; color: var(--text-dim); margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
  }
  .dash-card .label .flag { font-size: 0.85rem; }
  .dash-card .price {
    font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--text);
    direction: ltr; text-align: right;
  }
  .dash-card .change {
    font-size: 0.72rem; font-weight: 600; direction: ltr; text-align: right; margin-top: 2px;
  }
  .dash-card .change.up { color: #4CAF50; }
  .dash-card .change.down { color: #e74c3c; }
  .dash-card .change.flat { color: var(--text-dim); }
  .dash-card.loading .price { color: var(--text-dim); }
  .dash-refresh {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    background: transparent; border: 1px solid var(--card-border); color: var(--gold-dim);
    padding: 4px 12px; border-radius: 4px; cursor: pointer; transition: all 0.3s;
  }
  .dash-refresh:hover { border-color: var(--gold); color: var(--gold-light); }
  .dash-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
  .dash-section-label {
    font-size: 0.62rem; color: var(--gold-dim); text-transform: uppercase; letter-spacing: 2px;
    margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #1a1a1a;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  .footer {
    text-align: center; margin-top: 48px; padding-top: 20px;
    border-top: 1px solid var(--card-border); font-size: 0.72rem; color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">YouTS</div>
    <div class="tagline">Editorial Intelligence · YouTube → Insights</div>
  </div>

  <div class="top-bar">
    <button class="dashboard-toggle" id="dashToggle" onclick="toggleDashboard()">
      📊 דאשבורד שוק
    </button>
    <button class="btn-run-all" id="runAllBtn" onclick="runAllChannels()">
      <span class="spinner"></span> טען את כל הערוצים
    </button>
    <button class="btn-conclusions" id="conclusionsBtn" onclick="switchTab('conclusions')">
      מסקנות
    </button>
  </div>

  <!-- Market Dashboard -->
  <div class="dashboard-wrap" id="dashboardWrap">
    <div class="dashboard-header">
      <div class="dashboard-title">נתוני שוק בזמן אמת</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="dashboard-updated" id="dashUpdated"></div>
        <button class="dash-refresh" id="dashRefreshBtn" onclick="refreshDashboard()">🔄 עדכן</button>
      </div>
    </div>

    <div class="dash-section-label">שערי חליפין</div>
    <div class="dashboard-grid" id="dashFx"></div>

    <div class="dash-section-label">מדדים מובילים</div>
    <div class="dashboard-grid" id="dashIndices"></div>

    <div class="dash-section-label">אג״ח ותנודתיות</div>
    <div class="dashboard-grid" id="dashBonds"></div>

    <div class="dash-section-label">סחורות וקריפטו</div>
    <div class="dashboard-grid" id="dashCommodities"></div>
  </div>

  <div class="run-all-progress" id="runAllProgress"></div>
  <div class="progress-bar-wrap" id="progressBarWrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="custom-input-row" id="customRow">
    <input type="text" id="customInput" placeholder="https://www.youtube.com/@ChannelName" />
    <button class="btn" id="customBtn" onclick="loadCustomChannel()">
      <span class="spinner"></span> YouTS
    </button>
  </div>

  <div class="channel-info" id="channelInfo">
    <div class="channel-name" id="channelName"></div>
    <div class="channel-meta" id="channelMeta"></div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="status" id="status"></div>

  <div class="grid" id="grid"></div>
  <div class="conclusions-panel" id="conclusionsPanel"></div>

  <div class="footer">YouTS — כל הזכויות שמורות © 2025</div>
</div>

<script>
// ——— Channel Registry ———
var CHANNELS = [
  { id: 'micha', label: 'מיכה סטוקס', handle: 'Micha.Stocks', cat: 'storytelling' },
  { id: 'jamesjani', label: 'James Jani', handle: 'JamesJani', cat: 'storytelling' },
  { id: 'magnates', label: 'MagnatesMedia', handle: 'MagnatesMedia', cat: 'storytelling' },
  { id: 'moon', label: 'Moon', handle: 'MoonReal', cat: 'storytelling' },
  { id: 'coldfusion', label: 'ColdFusion', handle: 'ColdFusion', cat: 'storytelling' },
  { id: 'finedu', label: 'Financial Education', handle: 'FinancialEducation', cat: 'investing' },
  { id: 'graham', label: 'Graham Stephan', handle: 'GrahamStephan', cat: 'investing' },
  { id: 'plainbagel', label: 'The Plain Bagel', handle: 'ThePlainBagel', cat: 'investing' },
  { id: 'letstalk', label: "Let's Talk Money", handle: 'josephhogue', cat: 'investing' },
  { id: 'bloomberg', label: 'Bloomberg', handle: 'markets', cat: 'macro' },
  { id: 'yahoo', label: 'Yahoo Finance', handle: 'YahooFinance', cat: 'macro' }
];

var PROXIES = [
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
  'https://api.codetabs.com/v1/proxy?quest='
];

async function fetchViaProxy(url) {
  var lastErr = null;
  // Try cors.eu.org first (direct URL append, no encode)
  try {
    var resp0 = await fetch('https://cors.eu.org/' + url);
    if (resp0.ok) return await resp0.text();
  } catch(e) { lastErr = e; }
  // Then try encoded proxies
  for (var p = 0; p < PROXIES.length; p++) {
    try {
      var resp = await fetch(PROXIES[p] + encodeURIComponent(url));
      if (resp.ok) return await resp.text();
      lastErr = new Error('HTTP ' + resp.status);
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('כל ה-proxies נכשלו');
}

// channelData[tabId] = { channelName, channelMeta, videos[], articles[] }
var channelData = {};
var failedTabs = {}; // tabId -> error message
var activeTab = '';
var loadingTab = '';

// ——— Init tabs ———
function initTabs() {
  var container = document.getElementById('tabs');
  container.innerHTML = '';

  CHANNELS.forEach(function(ch) {
    var t = document.createElement('div');
    t.className = 'tab';
    t.id = 'tab-' + ch.id;
    t.textContent = ch.label;
    t.onclick = function() { switchTab(ch.id); };
    container.appendChild(t);
  });

  // Custom tab
  var ct = document.createElement('div');
  ct.className = 'tab';
  ct.id = 'tab-custom';
  ct.textContent = '+ ערוץ חופשי';
  ct.onclick = function() { switchTab('custom'); };
  container.appendChild(ct);
}

function switchTab(tabId) {
  activeTab = tabId;

  // Update tab styles
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  var tabEl = document.getElementById('tab-' + tabId);
  if (tabEl) tabEl.classList.add('active');

  // Update conclusions button highlight
  var concBtn = document.getElementById('conclusionsBtn');
  if (tabId === 'conclusions') concBtn.classList.add('active');
  else concBtn.classList.remove('active');

  // Show/hide custom input
  var customRow = document.getElementById('customRow');
  customRow.classList.toggle('visible', tabId === 'custom');

  clearError();
  setStatus('');

  if (tabId === 'conclusions') {
    document.getElementById('grid').style.display = 'none';
    document.getElementById('channelInfo').classList.remove('visible');
    renderConclusions();
    return;
  }

  document.getElementById('grid').style.display = '';
  document.getElementById('conclusionsPanel').classList.remove('visible');

  if (channelData[tabId]) {
    showChannelData(tabId);
  } else if (tabId !== 'custom') {
    loadPresetChannel(tabId);
  } else {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('channelInfo').classList.remove('visible');
  }
}

function showChannelData(tabId) {
  var d = channelData[tabId];
  document.getElementById('channelName').textContent = d.channelName;
  document.getElementById('channelMeta').textContent = d.channelMeta;
  document.getElementById('channelInfo').classList.add('visible');

  if (d.noRecentVideos) {
    showNoRecentVideos(d.channelName);
  } else {
    renderCards(d.videos, d.articles);
  }
}

function showNoRecentVideos(channelName) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.display = '';
  document.getElementById('conclusionsPanel').classList.remove('visible');
  grid.innerHTML = '<div style="text-align:center;padding:60px 20px;">' +
    '<div style="font-size:3rem;margin-bottom:16px;opacity:0.3;">📭</div>' +
    '<div style="font-family:Playfair Display,serif;font-size:1.3rem;color:var(--gold);margin-bottom:10px;">אין פרסום</div>' +
    '<div style="font-size:0.85rem;color:var(--text-dim);max-width:400px;margin:0 auto;line-height:1.6;">' +
    'לא פורסמו סרטונים חדשים ב-3 הימים האחרונים בערוץ <strong style="color:var(--text);">' + escapeHtml(channelName) + '</strong>' +
    '</div></div>';
}

function markTabLoaded(tabId) {
  var el = document.getElementById('tab-' + tabId);
  if (el) el.classList.add('has-data');
}

// ——— Helpers ———
function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showError(msg) { var el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('visible'); }
function clearError() { document.getElementById('errorMsg').classList.remove('visible'); }

function setTabLoading(tabId, on) {
  loadingTab = on ? tabId : '';
  var btn = document.getElementById('customBtn');
  if (btn) { btn.disabled = on; if (on) btn.classList.add('loading'); else btn.classList.remove('loading'); }
}

function isHebrew(text) { return /[\u0590-\u05FF]/.test(text); }

// ——— Fetch channel ———
async function fetchChannelId(handle) {
  var pageUrl = 'https://www.youtube.com/@' + handle;
  var html = await fetchViaProxy(pageUrl);

  var cidMatch = html.match(/\"channelId\":\"(UC[\w\-]+)\"/) ||
                 html.match(/channel_id=(UC[\w\-]+)/) ||
                 html.match(/\"externalId\":\"(UC[\w\-]+)\"/);
  if (!cidMatch) throw new Error('לא הצלחתי למצוא את מזהה הערוץ');

  var nameMatch = html.match(/<title>([^<]+)<\/title>/);
  var name = handle;
  if (nameMatch) name = nameMatch[1].replace(' - YouTube', '').trim();

  var subMatch = html.match(/\"subscriberCountText\":\{\"simpleText\":\"([^\"]+)\"\}/);
  var subs = subMatch ? subMatch[1] : '';

  return { channelId: cidMatch[1], name: name, subscribers: subs };
}

async function fetchChannelInfoFromUrl(url) {
  var handle = '';
  var directId = '';
  var hm = url.match(/@([\w.\-]+)/);
  if (hm) handle = hm[1];
  var cm = url.match(/\/channel\/(UC[\w\-]+)/);
  if (cm) directId = cm[1];
  if (!handle && !directId) {
    var um = url.match(/\/(c|user)\/([\w.\-]+)/);
    if (um) handle = um[2];
  }
  if (!handle && !directId && !url.includes('/')) {
    handle = url.trim().replace(/^@/, '');
  }
  if (directId) return { channelId: directId, name: directId, subscribers: '' };
  if (!handle) throw new Error('לא הצלחתי לזהות את הערוץ מהקישור');
  return await fetchChannelId(handle);
}

async function fetchLatestVideos(channelId) {
  var feedUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId;
  var xml = await fetchViaProxy(feedUrl);
  var parser = new DOMParser();
  var doc = parser.parseFromString(xml, 'text/xml');
  var entries = doc.querySelectorAll('entry');
  var videos = [];
  // Only include videos from the last 3 days
  var now = new Date();
  var threeDaysAgo = new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000);
  var count = Math.min(entries.length, 15); // scan more entries to find recent ones
  for (var i = 0; i < count; i++) {
    var entry = entries[i];
    var publishedEl = entry.querySelector('published');
    var dateStr = publishedEl ? publishedEl.textContent : '';
    if (!dateStr) continue;
    var pubDate = new Date(dateStr);
    if (pubDate < threeDaysAgo) continue; // skip old videos

    var videoId = '';
    var vidIdEl = entry.querySelector('videoId');
    if (vidIdEl) videoId = vidIdEl.textContent;
    else {
      var link = entry.querySelector('link');
      if (link) { var vm = (link.getAttribute('href') || '').match(/v=([\w\-]+)/); if (vm) videoId = vm[1]; }
    }
    var titleEl = entry.querySelector('title');
    var title = titleEl ? titleEl.textContent : 'ללא כותרת';
    var date = dateStr.substring(0, 10);
    var views = '';
    var mediaGroup = entry.getElementsByTagName('media:group')[0];
    if (mediaGroup) {
      var community = mediaGroup.getElementsByTagName('media:community')[0];
      if (community) { var stats = community.getElementsByTagName('media:statistics')[0]; if (stats) views = stats.getAttribute('views') || ''; }
    }
    videos.push({ id: videoId, title: title, url: 'https://www.youtube.com/watch?v=' + videoId, date: date, views: views ? Number(views).toLocaleString() + ' צפיות' : '' });
    if (videos.length >= 4) break; // max 4 recent videos
  }
  // Return empty array instead of throwing — caller handles "no recent videos"
  return videos;
}

function detectTickers(title) {
  var lower = title.toLowerCase();
  var found = [];
  TICKER_DB.forEach(function(t) {
    t.patterns.forEach(function(p) {
      if (lower.includes(p) && !found.some(function(f) { return f.ticker === t.ticker; })) {
        found.push({ ticker: t.ticker, name: t.name, sector: t.sector });
      }
    });
  });
  return found;
}

function detectSentiment(title) {
  var lower = title.toLowerCase();
  var bullish = ['rally', 'surge', 'soar', 'boom', 'breakout', 'opportunity', 'buy', 'bull',
    'עלייה', 'שורי', 'הזדמנות', 'לקנות', 'פריצה', 'זינוק', 'שיא', 'record', 'all-time high',
    'growth', 'צמיחה', 'profit', 'רווח', 'beat', 'הפתעה חיובית', 'חיובי', 'bullish',
    'recovery', 'התאוששות', 'rebound', 'surge'];
  var bearish = ['crash', 'drop', 'fall', 'bear', 'recession', 'crisis', 'bubble', 'sell',
    'נפילה', 'דובי', 'מיתון', 'משבר', 'בועה', 'למכור', 'ירידה', 'warning', 'אזהרה',
    'risk', 'סיכון', 'danger', 'סכנה', 'overvalued', 'יקר מדי', 'correction', 'תיקון',
    'collapse', 'קריסה', 'fear', 'פחד', 'bearish', 'dump'];

  var bScore = 0;
  var beScore = 0;
  bullish.forEach(function(w) { if (lower.includes(w)) bScore++; });
  bearish.forEach(function(w) { if (lower.includes(w)) beScore++; });

  if (bScore > beScore) return 'bullish';
  if (beScore > bScore) return 'bearish';
  return 'neutral';
}

function getSentimentEmoji(s) {
  if (s === 'bullish') return '🟢';
  if (s === 'bearish') return '🔴';
  return '⚪';
}

function getSentimentLabel(s) {
  if (s === 'bullish') return 'חיובי';
  if (s === 'bearish') return 'שלילי';
  return 'ניטרלי';
}

  var primary = topics[0];

  var topicLabelsLocal = {
    'AI': hebrew ? 'בינה מלאכותית' : 'AI', 'NVIDIA': 'NVIDIA', 'MARKET': hebrew ? 'שוק ההון' : 'Markets',
    'CRYPTO': hebrew ? 'קריפטו' : 'Crypto', 'FED': hebrew ? 'הפד והריבית' : 'Fed & Rates',
    'TESLA': hebrew ? 'טסלה' : 'Tesla', 'APPLE': hebrew ? 'אפל' : 'Apple',

    'OPPORTUNITY': hebrew ? 'הזדמנויות' : 'Opportunities', 'RECESSION': hebrew ? 'מיתון' : 'Recession',
    'GEOPOLITICS': hebrew ? 'גיאופוליטיקה' : 'Geopolitics', 'ENERGY': hebrew ? 'אנרגיה' : 'Energy',
    'COMMODITIES': hebrew ? 'סחורות' : 'Commodities', 'BONDS': hebrew ? 'אג"ח' : 'Bonds',

    'REALESTATE': hebrew ? 'נדל"ן' : 'Real Estate'
  };

  // ─── Hash title for deterministic variation ───
  var titleHash = 0;
  for (var hi = 0; hi < title.length; hi++) { titleHash = ((titleHash << 5) - titleHash + title.charCodeAt(hi)) | 0; }
  titleHash = Math.abs(titleHash);

  var tickerNames = tickers.map(function(t) { return t.ticker + ' (' + t.name + ')'; });
  var tickerShort = tickers.map(function(t) { return t.ticker; });

    summary = '״' + title + '״ — ';

// ——— Render cards ———
function renderCards(videos, articles, showChannel) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.display = '';
  document.getElementById('conclusionsPanel').classList.remove('visible');

  articles.forEach(function(article, idx) {
    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + idx;
    var video = videos[idx];
    var num = String(idx + 1).padStart(2, '0');
    var dateStr = video.date || '';
    var viewsStr = video.views ? ' · ' + escapeHtml(video.views) : '';
    var channelLine = showChannel && video.channelName ? '<div class="card-channel">' + escapeHtml(video.channelName) + '</div>' : '';

    // Ticker badges
    var tickerBadges = '';
    if (article.tickers && article.tickers.length > 0) {
      tickerBadges = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">';
      article.tickers.forEach(function(tk) {
        tickerBadges += '<span style="background:rgba(212,175,55,0.15);border:1px solid var(--gold-dim);border-radius:4px;padding:2px 8px;font-size:0.7rem;color:var(--gold-light);">' + escapeHtml(tk.ticker) + '</span>';
      });
      tickerBadges += '</div>';
    }

    // Topic tags
    var topicTags = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">';
    article.topics.forEach(function(t) {
      topicTags += '<span style="background:rgba(255,255,255,0.05);border-radius:4px;padding:2px 8px;font-size:0.65rem;color:var(--text-dim);">' + escapeHtml(t) + '</span>';
    });
    topicTags += '<span style="font-size:0.7rem;">' + escapeHtml(article.sentiment) + '</span>';
    topicTags += '</div>';

    card.innerHTML =
      '<div class="card-number">' + num + '</div>' +
      '<div class="card-date">' + escapeHtml(dateStr) + viewsStr + '</div>' +
      channelLine +
      '<div class="card-title"><a href="' + escapeHtml(video.url) + '" target="_blank" rel="noopener">' + escapeHtml(video.title) + '</a></div>' +
      topicTags +
      tickerBadges +
      '<div class="section"><div class="section-label">סיכום</div><div class="section-content">' + escapeHtml(article.summary) + '</div></div>' +
      '<div class="section"><div class="section-label">נקודות מפתח</div><div class="section-content"><ul>' + article.keyPoints.map(function(s){ return '<li>' + escapeHtml(s) + '</li>'; }).join('') + '</ul></div></div>' +
      '<div class="section"><div class="section-label">מה לעשות בפורטפוליו</div><div class="section-content"><ul>' + article.portfolioActions.map(function(s){ return '<li>' + escapeHtml(s) + '</li>'; }).join('') + '</ul></div></div>' +
      '<div class="section"><div class="section-label">ניתוח מעמיק</div><div class="section-content">' + escapeHtml(article.analysis) + '</div></div>';

    grid.appendChild(card);
  });

  articles.forEach(function(_, idx) {
    setTimeout(function() { var c = document.getElementById('card-' + idx); if (c) c.classList.add('visible'); }, 150 + idx * 250);
  });
}

  if (topicCounts['GEOPOLITICS'] >= 1) watchItems.push({ icon: '🌍', text: 'מתיחויות גיאופוליטיות — השפעה על סחורות, שרשראות אספקה ומדדי סיכון. פיזור גיאוגרפי חשוב.' });
  if (topicCounts['AI'] >= 2) watchItems.push({ icon: '🤖', text: 'AI — עקבו אחרי הוצאות CAPEX של Hyperscalers (MSFT, GOOGL, AMZN). זה הביקוש האמיתי, לא ההייפ.' });
  if (topicCounts['CRYPTO'] >= 1) watchItems.push({ icon: '₿', text: 'קריפטו — עקבו אחרי זרימות ל-ETF ספוט ואחרי רגולציה. הביקוש המוסדי הוא המפתח.' });
  if (topicCounts['CORRECTION'] >= 1 || topicCounts['VOLATILITY'] >= 1) watchItems.push({ icon: '📉', text: 'VIX ותנודתיות — מעל 20 זה דגל אדום לזהירות, מתחת ל-15 זה זמן לבנות גידורים בזול.' });
  if (sortedTickers.some(function(t) { return t.sector && t.sector.includes('Commodities'); })) watchItems.push({ icon: '🥇', text: 'סחורות — מלאי נפט שבועי (EIA), מחיר זהב כמד פחד, ויחס נחושת/זהב כמד בריאות כלכלית.' });

  if (watchItems.length === 0) watchItems.push({ icon: '👀', text: 'עקבו אחרי הנושאים שעלו — כשמספר ערוצים בלתי תלויים מדברים על אותו דבר, זה בדרך כלל רלוונטי.' });

  watchItems.forEach(function(item) {
    html += '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #1a1a1a;align-items:flex-start;">';
    html += '<span style="font-size:1.1rem;flex-shrink:0;">' + item.icon + '</span>';
    html += '<span style="font-size:0.85rem;color:var(--text);line-height:1.6;">' + escapeHtml(item.text) + '</span>';
    html += '</div>';
  });
  html += '</div></div>';
  concIdx++;

  // ═══════════════════════════════════════
  // SECTION 6: Failed channels
  // ═══════════════════════════════════════
  if (failedKeys.length > 0) {
    html += '<div class="conclusion-section" id="conc-' + concIdx + '">';
    html += '<div class="conclusion-title">ערוצים שלא נטענו</div>';
    html += '<div class="conclusion-content">';
    failedKeys.forEach(function(tabId) {
      var ch = CHANNELS.find(function(c) { return c.id === tabId; });
      var label = ch ? ch.label : tabId;
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;">';
      html += '<span style="color:var(--text-dim);">' + escapeHtml(label) + ' — ' + escapeHtml(failedTabs[tabId]) + '</span>';
      html += '<button class="btn" onclick="retryFromConclusions(\'' + escapeHtml(tabId) + '\')" style="font-size:0.75rem;padding:6px 16px;">נסה שנית</button>';
      html += '</div>';
    });
    html += '</div></div>';
    concIdx++;
  }

  panel.innerHTML = html;
  panel.classList.add('visible');

  for (var i = 0; i < concIdx; i++) {
    (function(idx) {
      setTimeout(function() {
        var el = document.getElementById('conc-' + idx);
        if (el) el.classList.add('visible');
      }, 150 + idx * 180);
    })(i);
  }
}

function retryFromConclusions(tabId) {
  delete failedTabs[tabId];
  switchTab(tabId);
}

// ——— Load preset channel ———
async function loadPresetChannel(tabId) {
  var ch = CHANNELS.find(function(c) { return c.id === tabId; });
  if (!ch) return;

  setTabLoading(tabId, true);
  clearError();
  setStatus('מתחבר לערוץ ' + ch.label + '...');
  document.getElementById('grid').innerHTML = '';
  document.getElementById('channelInfo').classList.remove('visible');

  try {
    var info = await fetchChannelId(ch.handle);
    setStatus('מושך סרטונים אחרונים...');
    var videos = await fetchLatestVideos(info.channelId);

    if (videos.length === 0) {
      // No recent videos in last 3 days
      channelData[tabId] = {
        channelName: info.name,
        channelMeta: info.subscribers || 'Channel ID: ' + info.channelId,
        videos: [],
        articles: [],
        noRecentVideos: true
      };
      markTabLoaded(tabId);
      setStatus('');
      if (activeTab === tabId) {
        showChannelData(tabId);
      }
      return;
    }

    setStatus('מייצר כתבות...');
    var articles = videos.map(function(v) { return generateArticle(v.title); });

    channelData[tabId] = {
      channelName: info.name,
      channelMeta: info.subscribers || 'Channel ID: ' + info.channelId,
      videos: videos,
      articles: articles,
      noRecentVideos: false
    };

    markTabLoaded(tabId);
    setStatus('');

    if (activeTab === tabId) {
      showChannelData(tabId);
    }
  } catch (err) {
    failedTabs[tabId] = err.message || 'שגיאה בלתי צפויה';
    showError(err.message || 'שגיאה בלתי צפויה');
    showRetryButton(tabId);
    setStatus('');
  } finally {
    setTabLoading(tabId, false);
  }
}

function showRetryButton(tabId) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '<div style="text-align:center;padding:40px 0;">' +
    '<p style="color:var(--text-dim);margin-bottom:16px;">הטעינה נכשלה — נסה שנית</p>' +
    '<button class="btn" onclick="retryChannel(\'' + tabId + '\')" style="font-size:0.9rem;padding:10px 24px;">נסה שנית</button>' +
    '</div>';
}

function retryChannel(tabId) {
  delete failedTabs[tabId];
  clearError();
  if (tabId === 'custom') loadCustomChannel();
  else loadPresetChannel(tabId);
}

// ——— Run All Channels ———
var runAllActive = false;

async function runAllChannels() {
  if (runAllActive) return;
  runAllActive = true;

  var btn = document.getElementById('runAllBtn');
  btn.disabled = true;
  btn.classList.add('loading');

  var progressEl = document.getElementById('runAllProgress');
  var barWrap = document.getElementById('progressBarWrap');
  var bar = document.getElementById('progressBar');
  barWrap.classList.add('visible');

  var toLoad = CHANNELS.filter(function(ch) { return !channelData[ch.id]; });
  var total = toLoad.length;

  if (total === 0) {
    progressEl.textContent = 'כל הערוצים כבר נטענו!';
    bar.style.width = '100%';
    btn.disabled = false;
    btn.classList.remove('loading');
    runAllActive = false;
    setTimeout(function() {
      barWrap.classList.remove('visible');
      progressEl.textContent = '';
      switchTab('conclusions');
    }, 1200);
    return;
  }

  var loaded = 0;
  var failed = 0;

  for (var i = 0; i < toLoad.length; i++) {
    var ch = toLoad[i];
    progressEl.textContent = 'טוען ' + ch.label + '... (' + (loaded + failed + 1) + '/' + total + ')';
    bar.style.width = ((loaded + failed) / total * 100) + '%';

    try {
      var info = await fetchChannelId(ch.handle);
      var videos = await fetchLatestVideos(info.channelId);
      var articles = videos.length > 0 ? videos.map(function(v) { return generateArticle(v.title); }) : [];

      channelData[ch.id] = {
        channelName: info.name,
        channelMeta: info.subscribers || 'Channel ID: ' + info.channelId,
        videos: videos,
        articles: articles,
        noRecentVideos: videos.length === 0
      };
      markTabLoaded(ch.id);
      delete failedTabs[ch.id];
      loaded++;
    } catch (err) {
      failedTabs[ch.id] = err.message || 'שגיאה';
      var tabEl = document.getElementById('tab-' + ch.id);
      if (tabEl) tabEl.style.borderColor = '#e74c3c';
      failed++;
    }

    bar.style.width = ((loaded + failed) / total * 100) + '%';
  }

  bar.style.width = '100%';
  var msg = 'הושלם: ' + loaded + ' ערוצים נטענו';
  if (failed > 0) msg += ', ' + failed + ' נכשלו';
  progressEl.textContent = msg;

  btn.disabled = false;
  btn.classList.remove('loading');
  runAllActive = false;

  // Auto-switch to conclusions after a moment
  setTimeout(function() {
    switchTab('conclusions');
    setTimeout(function() {
      barWrap.classList.remove('visible');
    }, 1000);
  }, 1500);
}

// ——— Load custom channel ———
async function loadCustomChannel() {
  var input = document.getElementById('customInput').value.trim();
  if (!input) { showError('נא להזין קישור לערוץ YouTube'); return; }

  setTabLoading('custom', true);
  clearError();
  setStatus('מתחבר לערוץ...');
  document.getElementById('grid').innerHTML = '';
  document.getElementById('channelInfo').classList.remove('visible');

  try {
    var info = await fetchChannelInfoFromUrl(input);
    setStatus('מושך סרטונים אחרונים...');
    var videos = await fetchLatestVideos(info.channelId);
    var articles = videos.length > 0 ? videos.map(function(v) { return generateArticle(v.title); }) : [];

    channelData['custom'] = {
      channelName: info.name,
      channelMeta: info.subscribers || 'Channel ID: ' + info.channelId,
      videos: videos,
      articles: articles,
      noRecentVideos: videos.length === 0
    };

    markTabLoaded('custom');
    setStatus('');

    if (activeTab === 'custom') {
      showChannelData('custom');
    }
  } catch (err) {
    failedTabs['custom'] = err.message || 'שגיאה בלתי צפויה';
    showError(err.message || 'שגיאה בלתי צפויה');
    showRetryButton('custom');
    setStatus('');
  } finally {
    setTabLoading('custom', false);
  }
}

// Enter key for custom input
document.addEventListener('keydown', function(e) {

function toggleDashboard() {
  dashboardOpen = !dashboardOpen;
  var wrap = document.getElementById('dashboardWrap');
  var btn = document.getElementById('dashToggle');
  if (dashboardOpen) {
    wrap.classList.add('visible');
    btn.classList.add('active');

      renderDashCards('dashFx', DASH_SYMBOLS.fx);

function renderDashCards(containerId, items) {
  var el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'dash-card loading';
    card.id = 'dash-' + item.symbol.replace(/[^a-zA-Z0-9]/g, '_');
    card.innerHTML =
      '<div class="label"><span class="flag">' + item.flag + '</span>' + escapeHtml(item.label) + '</div>' +
      '<div class="price" style="color:var(--text-dim);">—</div>' +
      '<div class="change flat">טוען...</div>';
    el.appendChild(card);
  });
}

// ─── FX: Direct API — no proxy needed, CORS-enabled, 1 call for all rates ───
async function fetchFxRates() {
  var resp = await fetch('https://open.er-api.com/v6/latest/USD');
  if (!resp.ok) throw new Error('FX API error ' + resp.status);
  var data = await resp.json();
  return data.rates; // { ILS: 3.65, EUR: 0.92, GBP: 0.79, ... }
}

// ─── Yahoo Finance via Vercel serverless proxy (works from any origin incl. file://) ───
var QUOTE_API = 'https://youts-dashboard.vercel.app/api/quote';

async function fetchQuoteBatch(symbols) {
  try {
    var c = new AbortController();
    var t = setTimeout(function() { c.abort(); }, 15000);
    var r = await fetch(QUOTE_API + '?symbols=' + encodeURIComponent(symbols.join(',')), { signal: c.signal });
    clearTimeout(t);
    if (!r.ok) return {};
    return await r.json();
  } catch(e) { return {}; }
}

async function fetchQuote(symbol) {
  var batch = await fetchQuoteBatch([symbol]);
  return batch[symbol] || null;
}

function updateDashCard(symbol, itemDef, quoteData) {
  var cardId = 'dash-' + symbol.replace(/[^a-zA-Z0-9]/g, '_');
  var card = document.getElementById(cardId);
  if (!card) return;

  var price = quoteData.price;
  var prevClose = quoteData.prevClose;
  var change = price && prevClose ? price - prevClose : 0;
  var changePct = prevClose ? (change / prevClose * 100) : 0;
  var isUp = change > 0.001;
  var isDown = change < -0.001;

  var prefix = itemDef.prefix || '';
  var suffix = itemDef.suffix || '';
  var priceStr = prefix + Number(price).toLocaleString(undefined, { minimumFractionDigits: itemDef.decimals, maximumFractionDigits: itemDef.decimals }) + suffix;

  var arrow = isUp ? '▲' : isDown ? '▼' : '—';
  var sign = isUp ? '+' : '';
  var changeStr = arrow + ' ' + sign + change.toFixed(itemDef.decimals) + ' (' + sign + changePct.toFixed(2) + '%)';
  var cls = isUp ? 'up' : isDown ? 'down' : 'flat';

  card.classList.remove('loading');
  card.querySelector('.price').style.color = '';
  card.querySelector('.price').textContent = priceStr;
  card.querySelector('.change').className = 'change ' + cls;
  card.querySelector('.change').textContent = changeStr;
}

function setDashCardError(symbol) {
  var cardId = 'dash-' + symbol.replace(/[^a-zA-Z0-9]/g, '_');
  var card = document.getElementById(cardId);
  if (!card) return;
  card.classList.remove('loading');
  card.querySelector('.price').textContent = '—';
  card.querySelector('.change').className = 'change flat';
  card.querySelector('.change').textContent = 'לא זמין';
}

async function refreshDashboard() {
  if (dashLoading) return;
  dashLoading = true;
  var btn = document.getElementById('dashRefreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ טוען...';

  renderDashCards('dashFx', DASH_SYMBOLS.fx);
  renderDashCards('dashIndices', DASH_SYMBOLS.indices);
  renderDashCards('dashBonds', DASH_SYMBOLS.bonds);
  renderDashCards('dashCommodities', DASH_SYMBOLS.commodities);

  var loaded = 0, failed = 0;

  // ── FX: direct API, instant ──
  try {
    var rates = await fetchFxRates();
    var fxPairs = {};
    if (rates.ILS) fxPairs['USDILS=X'] = rates.ILS;
    if (rates.ILS && rates.EUR) fxPairs['EURILS=X'] = rates.ILS / rates.EUR;
    if (rates.EUR) fxPairs['EURUSD=X'] = 1 / rates.EUR;
    if (rates.GBP) fxPairs['GBPUSD=X'] = 1 / rates.GBP;
    if (rates.EUR && rates.JPY && rates.GBP && rates.CAD && rates.SEK && rates.CHF) {
      fxPairs['DX-Y.NYB'] = 50.14348112 * Math.pow(1/rates.EUR,0.576) * Math.pow(rates.JPY,0.136) * Math.pow(1/rates.GBP,0.119) * Math.pow(rates.CAD,0.091) * Math.pow(rates.SEK,0.042) * Math.pow(rates.CHF,0.036);
    }
    DASH_SYMBOLS.fx.forEach(function(item) {
      if (fxPairs[item.symbol]) {
        var card = document.getElementById('dash-' + item.symbol.replace(/[^a-zA-Z0-9]/g, '_'));
        if (card) {
          card.classList.remove('loading');
          card.querySelector('.price').style.color = '';
          card.querySelector('.price').textContent = (item.prefix||'') + fxPairs[item.symbol].toFixed(item.decimals) + (item.suffix||'');
          card.querySelector('.change').className = 'change flat';
          card.querySelector('.change').textContent = 'שער יומי';
        }
        loaded++;
      } else { setDashCardError(item.symbol); failed++; }
    });
  } catch(e) {
    DASH_SYMBOLS.fx.forEach(function(item) { setDashCardError(item.symbol); failed++; });
  }

  // ── All other items: single batch API call for all symbols ──
  var allItems = [].concat(DASH_SYMBOLS.indices, DASH_SYMBOLS.bonds, DASH_SYMBOLS.commodities);
  btn.textContent = '⏳ מדדים (' + allItems.length + ')...';

  var allSymbols = allItems.map(function(item) { return item.symbol; });
  var batchResults = await fetchQuoteBatch(allSymbols);
  allItems.forEach(function(item) {
    var q = batchResults[item.symbol];
    if (q) { updateDashCard(item.symbol, item, q); loaded++; }
    else { setDashCardError(item.symbol); failed++; }
  });

  // ── Done ──
  var now = new Date();
  var ts = now.toLocaleString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  document.getElementById('dashUpdated').textContent = 'עודכן: ' + ts + ' · ' + loaded + ' נטענו';
  if (failed > 0) document.getElementById('dashUpdated').textContent += ', ' + failed + ' נכשלו';
  btn.disabled = false;
  btn.textContent = '🔄 עדכן';
  dashLoading = false;
}
